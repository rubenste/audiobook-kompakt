<svg width="1024" height="1024" viewBox="0 0 81 81"
     xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Inner-stroke border: clip the rect so the stroke stays inside -->
  <defs>
    <clipPath id="c">
      <rect width="81" height="81" rx="19" ry="19"/>
    </clipPath>
  </defs>

  <!-- White background -->
  <rect width="81" height="81" rx="19" ry="19" fill="white"/>

  <!-- Black inner border (stroke-width 10, clipped to half = 5px inside) -->
  <rect width="81" height="81" rx="19" ry="19"
        fill="none" stroke="black" stroke-width="10"
        clip-path="url(#c)"/>

  <!-- Book icon — exact coordinates from design file -->
  <path fill-rule="evenodd" clip-rule="evenodd"
        d="M23.656,14.229 C21.443,14.229 19.646,16.026 19.646,18.240
           L19.646,56.900
           C20.849,56.284 22.213,55.938 23.656,55.938
           L61.354,55.938 L61.354,14.229 L23.656,14.229 Z
           M61.354,60.750 L23.656,60.750
           C21.441,60.750 19.646,62.546 19.646,64.760
           C19.646,66.975 21.441,68.771 23.656,68.771
           L61.354,68.771 L61.354,60.750 Z
           M14.833,64.760 L14.833,18.240
           C14.833,13.367 18.783,9.417 23.656,9.417
           L66.167,9.417 L66.167,73.583
           L23.656,73.583
           C18.783,73.583 14.833,69.633 14.833,64.760 Z"
        fill="black"/>

  <!-- Play triangle — exact coordinates from design file,
       white stroke creates separation from the book fill -->
  <path d="M48.391,33.551 L37.891,27.491
           C37.553,27.294 37.135,27.294 36.797,27.491
           C36.456,27.686 36.248,28.049 36.250,28.441
           L36.250,40.564
           C36.250,40.955 36.458,41.316 36.796,41.512
           C37.135,41.708 37.552,41.708 37.891,41.513
           L48.391,35.449
           C48.732,35.253 48.938,34.898 48.938,34.500
           C48.938,34.102 48.732,33.752 48.391,33.551 Z"
        fill="black" stroke="white" stroke-width="3.5"
        stroke-linejoin="round"/>

</svg>
